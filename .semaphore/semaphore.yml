version: v1.0
name: elcrimen-trends
agent:
  machine:
    type: e2-standard-2
    os_image: ubuntu2404
execution_time_limit:
  hours: 4
blocks:
  - name: "Docker Image"
    task:
      secrets:
        - name: elcrimen-secrets
      jobs:
        - name: Show Environment
          commands:
            - echo $SEMAPHORE_PIPELINE_ID
            - echo $HOME
            - echo $SEMAPHORE_GIT_DIR
        - name: Test Artifacts
          commands:
            - touch test.log
            - artifact push job test.log  --force
        - name: Build with docker
          commands:
            - checkout
            - echo $DOCKER_PASSWORD | docker login --username "$DOCKER_USERNAME" --password-stdin
            - docker pull diegovalle/docker-rstanarm:latest
            - docker pull node:24.0.0
            - docker images
            - ls
            - pwd
            - docker run --entrypoint /bin/sh -e CI="true" -e VICTIMAS_URL="$VICTIMAS_URL" -v "$HOME/$SEMAPHORE_GIT_DIR":/elcrimen diegovalle/docker-rstanarm -c "cd /elcrimen && Rscript main.R"
            - artifact push project "$HOME/$SEMAPHORE_GIT_DIR/"output  --force
            - artifact push project "$HOME/$SEMAPHORE_GIT_DIR/"web  --force
            - artifact push project "$HOME/$SEMAPHORE_GIT_DIR/"graphs --force
            - docker run --entrypoint /bin/sh -e FIREBASE_TOKEN="$FIREBASE_TOKEN" -v "$HOME/$SEMAPHORE_GIT_DIR":/elcrimen node:24.0.0 -c 'cd /elcrimen/web && npm install -g firebase-tools@13.0.1 && firebase deploy --non-interactive --token "$FIREBASE_TOKEN"'
      epilogue:
        commands:
          - if [ "$SEMAPHORE_JOB_RESULT" = "passed" ]; then zip elcrimen.zip "$HOME/$SEMAPHORE_GIT_DIR/"output/* "$HOME/$SEMAPHORE_GIT_DIR/"graphs/* "$HOME/$SEMAPHORE_GIT_DIR/"web/* && ./upload_to_b2.sh elcrimen.zip; fi
          - if [ "$SEMAPHORE_JOB_RESULT" = "failed" ]; then zip elcrimen.zip "$HOME/$SEMAPHORE_GIT_DIR/"output/* "$HOME/$SEMAPHORE_GIT_DIR/"graphs/* "$HOME/$SEMAPHORE_GIT_DIR/"web/* && ./upload_to_b2.sh elcrimen.zip; fi
